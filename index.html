<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Flashcards (Integração Google Calendar)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .font-title { font-family: 'Anton', sans-serif; }
        
        /* --- CARD --- */
        .flashcard-render-container {
            position: relative; width: 100%; aspect-ratio: 1080 / 1450;
            overflow: hidden; border-radius: 0.5rem; background-color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .flashcard-bg-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .flashcard-artwork {
            position: absolute; left: 50%; transform: translateX(-50%); bottom: 5%; 
            width: auto; max-height: 50%; max-width: 80%; 
            object-fit: contain; z-index: 5; border-radius: 1.5rem; pointer-events: none;
        }
        .flashcard-text-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 4%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; z-index: 10; 
        }
        .font-flashcard { font-family: 'Anton', sans-serif; line-height: 1.2; color: white; text-shadow: 2px 2px 0 #000; }
        #front-card-render .font-flashcard { font-size: clamp(1.5rem, 8cqi, 3rem); }
        #back-card-render .flashcard-text-overlay { justify-content: flex-start; padding-top: 20%; height: 45%; }
        #back-card-render .font-flashcard { font-size: clamp(0.8rem, 4.8cqi, 1.9rem); }
        
        .aux-text {
            position: absolute; font-family: 'Inter', sans-serif; font-weight: 600;
            font-size: clamp(0.6rem, 2cqi, 0.9rem); color: white; background: rgba(0,0,0,0.6);
            padding: 2px 8px; border-radius: 4px; z-index: 11; text-transform: uppercase;
        }

        /* --- UI --- */
        .library-item { transition: all 0.2s; border-left: 4px solid transparent; }
        .library-item:hover { border-left-color: #2563eb; background-color: #f1f5f9; }
        
        .google-btn {
            background-color: #fff; color: #757575; border: 1px solid #ddd;
            display: inline-flex; items-center; padding: 8px 16px; border-radius: 4px; font-weight: 600; font-size: 14px;
            cursor: pointer; transition: background-color .3s;
        }
        .google-btn:hover { background-color: #f1f1f1; }
        .google-icon { width: 18px; height: 18px; margin-right: 8px; }
    </style>
</head>
<body class="p-4 md:p-8" onload="handleClientLoad()">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-lg border border-slate-200 sticky top-4">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <span>⚡</span> Criar Card
                    </h2>
                    <div id="auth-status" class="text-xs font-bold text-red-500 border border-red-200 bg-red-50 px-2 py-1 rounded">
                        Google Desconectado
                    </div>
                </div>

                <button id="authorize_button" class="w-full mb-6 google-btn justify-center" onclick="handleAuthClick()">
                    <img class="google-icon" src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg"/>
                    Conectar Google Calendar
                </button>

                <div class="grid grid-cols-2 gap-3 mb-4 p-3 bg-blue-50 rounded-lg border border-blue-100">
                    <div>
                        <label class="block text-xs font-bold text-blue-800 uppercase mb-1">Matéria</label>
                        <input type="text" id="input-subject" class="w-full p-2 text-sm border rounded" placeholder="Ex: Cardiologia">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-blue-800 uppercase mb-1">Conceito</label>
                        <input type="text" id="input-concept" class="w-full p-2 text-sm border rounded" placeholder="Ex: Pericardite">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Imagem (Upload)</label>
                    <input type="file" id="input-image" accept="image/*" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
                    <img id="preview-thumb" class="h-20 mt-2 object-contain hidden rounded border" />
                </div>

                <div class="space-y-3 mb-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Pergunta (Frente)</label>
                        <textarea id="input-q" rows="2" class="w-full p-2 border rounded text-sm"></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Resposta (Verso)</label>
                        <textarea id="input-a" rows="3" class="w-full p-2 border rounded text-sm"></textarea>
                    </div>
                </div>

                <button id="btn-save" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow flex items-center justify-center gap-2">
                    💾 Salvar na Biblioteca
                </button>
            </div>
        </div>

        <div class="lg:col-span-7">
            <div class="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden min-h-[600px]">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <div>
                        <h2 class="text-xl font-bold text-slate-800">📚 Minha Biblioteca</h2>
                        <p class="text-xs text-slate-500">Histórico + Revisão Espaçada Automática</p>
                    </div>
                    <button onclick="clearStorage()" class="text-xs text-red-500 hover:text-red-700 underline">Limpar</button>
                </div>
                <div id="library-container" class="p-6 space-y-6">
                    <div class="text-center text-slate-400 py-10"><p>Biblioteca vazia.</p></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-preview" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl max-w-4xl w-full max-h-[90vh] overflow-y-auto p-6 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-3xl font-bold text-gray-500">&times;</button>
            <div id="modal-render-area" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>
    </div>

    <script>
        // ======================================================
        // CONFIGURAÇÃO DA API GOOGLE - PREENCHA AQUI!
        // ======================================================
        const CLIENT_ID = '477548483924-e8aritdjhs9emuu23s67cqa4pcc0kc4j.apps.googleusercontent.com'; // Pegue no Google Cloud Console
        const API_KEY = 'AIzaSyBCi_WyOv0M6QPiIklXgP4DshN8Y6vWM3s'; // Pegue no Google Cloud Console
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/calendar.events';
        // ======================================================

        const BG_BASE64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg=="; 
        
        let tokenClient;
        let gapiInited = false;
        let gisInited = false;
        let library = JSON.parse(localStorage.getItem('flashcardLibrary')) || [];
        let currentImageSrc = null;

        // --- INICIALIZAÇÃO GOOGLE API ---
        function handleClientLoad() {
            gapi.load('client', initializeGapiClient);
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '', // Definido ao solicitar token
            });
            gisInited = true;
            renderLibrary();
        }

        async function initializeGapiClient() {
            await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
            gapiInited = true;
            checkAuth();
        }

        function checkAuth() {
            // Apenas verifica se a biblioteca carregou, a autenticação real é no clique
            if (gapiInited && gisInited) {
                document.getElementById('authorize_button').classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) throw (resp);
                document.getElementById('auth-status').textContent = "Google Conectado ✅";
                document.getElementById('auth-status').className = "text-xs font-bold text-green-600 border border-green-200 bg-green-50 px-2 py-1 rounded";
                document.getElementById('authorize_button').style.display = 'none';
            };

            if (gapi.client.getToken() === null) {
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                tokenClient.requestAccessToken({prompt: ''});
            }
        }

        // --- LÓGICA DE FLASHCARDS ---

        // 1. Upload
        document.getElementById('input-image').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentImageSrc = ev.target.result;
                    document.getElementById('preview-thumb').src = currentImageSrc;
                    document.getElementById('preview-thumb').classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        // 2. Salvar Card
        document.getElementById('btn-save').addEventListener('click', () => {
            const s = document.getElementById('input-subject').value;
            const c = document.getElementById('input-concept').value;
            const q = document.getElementById('input-q').value;
            const a = document.getElementById('input-a').value;

            if(!s || !c || !q || !a) return alert("Preencha tudo!");

            const newCard = {
                id: Date.now(), subject: s, concept: c, question: q, answer: a,
                image: currentImageSrc, createdAt: new Date().toISOString()
            };
            library.unshift(newCard);
            localStorage.setItem('flashcardLibrary', JSON.stringify(library));
            renderLibrary();
        });

        // 3. Renderizar Lista
        function renderLibrary() {
            const container = document.getElementById('library-container');
            if (library.length === 0) { container.innerHTML = '<p class="text-center text-gray-400">Vazio</p>'; return; }

            const grouped = library.reduce((acc, card) => {
                const subj = card.subject.toUpperCase();
                if (!acc[subj]) acc[subj] = [];
                acc[subj].push(card);
                return acc;
            }, {});

            let html = "";
            for (const [subject, cards] of Object.entries(grouped)) {
                html += `<div class="mb-4 border rounded overflow-hidden">
                    <div class="bg-slate-100 p-3 font-bold cursor-pointer" onclick="toggle('${subject.replace(/\s/g, '_')}')">📂 ${subject} (${cards.length})</div>
                    <div id="sec-${subject.replace(/\s/g, '_')}" class="bg-white">`;
                
                cards.forEach(card => {
                    html += `
                        <div class="p-4 border-b flex justify-between items-center gap-4">
                            <div><h4 class="font-bold">${card.concept}</h4><p class="text-xs text-gray-500 truncate w-40">${card.question}</p></div>
                            <div class="flex gap-2">
                                <button onclick="openPreview(${card.id})" class="text-xs border px-2 py-1 rounded hover:bg-gray-100">👁️ Ver</button>
                                <button onclick="addToGoogleCalendar(${card.id})" class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded hover:bg-green-200 font-bold flex items-center gap-1">
                                    📅 Add Agenda
                                </button>
                                <button onclick="deleteCard(${card.id})" class="text-xs text-red-500 font-bold px-2">✕</button>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
            }
            container.innerHTML = html;
        }

        window.toggle = (id) => document.getElementById(`sec-${id}`).classList.toggle('hidden');
        window.deleteCard = (id) => {
            if(confirm("Apagar?")) {
                library = library.filter(c => c.id !== id);
                localStorage.setItem('flashcardLibrary', JSON.stringify(library));
                renderLibrary();
            }
        };

        // --- INTEGRAÇÃO GOOGLE CALENDAR ---
        async function addToGoogleCalendar(cardId) {
            // Verifica Login
            if (!gapi.client.getToken()) {
                alert("Por favor, clique em 'Conectar Google Calendar' no topo primeiro!");
                handleAuthClick();
                return;
            }

            const card = library.find(c => c.id === cardId);
            if (!card) return;

            if(!confirm(`Deseja adicionar 8 eventos de revisão para "${card.concept}" no seu Google Calendar?`)) return;

            // Esquema de Repetição
            const intervals = [1, 3, 7, 14, 30, 60, 90, 120];
            const batch = gapi.client.newBatch();
            
            intervals.forEach(days => {
                const eventDate = new Date();
                eventDate.setDate(eventDate.getDate() + days);
                const dateStr = eventDate.toISOString().split('T')[0]; // YYYY-MM-DD

                const event = {
                    'summary': `Revisão: ${card.subject} - ${card.concept} (Dia ${days})`,
                    'description': `Pergunta: ${card.question}\n\nResposta: ${card.answer}`,
                    'start': { 'date': dateStr },
                    'end': { 'date': dateStr },
                    'reminders': {
                        'useDefault': false,
                        'overrides': [
                          {'method': 'popup', 'minutes': 540} // Notifica as 9:00 AM (9 * 60)
                        ]
                    },
                    'colorId': '10' // Verde (Basil)
                };

                // Adiciona ao Batch (Lote)
                const request = gapi.client.calendar.events.insert({
                    'calendarId': 'primary',
                    'resource': event
                });
                batch.add(request);
            });

            try {
                // Envia todos de uma vez
                const response = await batch.then();
                console.log(response);
                alert(`Sucesso! 8 revisões agendadas para ${card.concept}.`);
            } catch (err) {
                console.error("Erro ao adicionar eventos", err);
                alert("Erro ao acessar o Google Calendar. Verifique o console (F12).");
            }
        }

        // --- PREVIEW ---
        window.openPreview = (id) => {
            const card = library.find(c => c.id === id);
            const modal = document.getElementById('modal-preview');
            const area = document.getElementById('modal-render-area');
            const fmt = t => t.split(" ").map(w => w.length>4 && Math.random()>0.6 ? `<strong>${w}</strong>`:w).join(" ");
            
            const qFmt = fmt(card.question);
            const aFmt = fmt(card.answer);
            const imgHTML = card.image ? `<img src="${card.image}" class="flashcard-artwork">` : '';

            area.innerHTML = `
                <div><h4 class="text-center font-bold">FRENTE</h4><div id="pf" class="flashcard-render-container"><img src="${BG_BASE64}" class="flashcard-bg-img"><div class="flashcard-text-overlay"><div class="font-flashcard" style="font-size:3rem">${qFmt}</div></div></div><button onclick="dl('pf','${card.concept}_F')" class="w-full mt-2 bg-slate-800 text-white py-2 rounded">Baixar</button></div>
                <div><h4 class="text-center font-bold">VERSO</h4><div id="pb" class="flashcard-render-container"><img src="${BG_BASE64}" class="flashcard-bg-img">${imgHTML}<div class="flashcard-text-overlay" style="justify-content:flex-start;padding-top:20%"><div class="font-flashcard" style="font-size:1.5rem">${aFmt}</div></div></div><button onclick="dl('pb','${card.concept}_V')" class="w-full mt-2 bg-slate-800 text-white py-2 rounded">Baixar</button></div>
            `;
            modal.classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('modal-preview').classList.add('hidden');
        window.dl = (id, name) => {
            html2canvas(document.getElementById(id), {useCORS:true, scale:2, backgroundColor:null}).then(c => {
                const a = document.createElement('a'); a.download=name+".png"; a.href=c.toDataURL("image/png"); a.click();
            });
        };
    </script>
</body>
</html>
